server:
  port: ${PORT:8081}

spring:
  application:
    name: mini-payroll-attendance

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/payroll_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

jwt:
  secret: ${JWT_SECRET:my-super-secret-jwt-key-that-is-at-least-32-characters-long}
  expiration: 86400000
